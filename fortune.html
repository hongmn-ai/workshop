<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 메시지</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    /* ── 랜딩 ── */
    #landing { animation: fadeIn 1.2s ease; }

    .main-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .title {
      font-family: 'Noto Serif KR', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f0e6ff;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #9b8abf;
      margin-bottom: 2.5rem;
      letter-spacing: 0.08em;
    }

    /* 선택 카드 2개 */
    .choice-wrap {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .choice-card {
      flex: 1;
      max-width: 200px;
      background: linear-gradient(160deg, rgba(124,58,237,0.18), rgba(168,85,247,0.08));
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 20px;
      padding: 1.6rem 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .choice-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 28px rgba(168,85,247,0.45);
      border-color: #a855f7;
    }
    .choice-card:active { transform: translateY(0); }
    .choice-icon { font-size: 2.4rem; display: block; margin-bottom: 0.7rem; }
    .choice-label {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      color: #f0e6ff;
      font-weight: 700;
      line-height: 1.5;
    }
    .choice-desc {
      font-size: 0.75rem;
      color: #9b8abf;
      margin-top: 0.3rem;
    }

    /* ── 로딩 ── */
    #loading { display: none; }
    .loading-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: spin-glow 4s ease-in-out infinite;
    }
    @keyframes spin-glow {
      0%, 100% { filter: drop-shadow(0 0 8px #a855f7); transform: rotate(-5deg); }
      50% { filter: drop-shadow(0 0 20px #7c3aed); transform: rotate(5deg); }
    }
    .dots span {
      display: inline-block;
      width: 10px; height: 10px;
      background: #a855f7;
      border-radius: 50%;
      margin: 0 4px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-12px); opacity: 1; }
    }

    /* ── 결과 ── */
    #result { display: none; }

    .result-label {
      font-size: 0.85rem;
      color: #9b8abf;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }
    .result-card {
      background: linear-gradient(160deg, rgba(124,58,237,0.15), rgba(168,85,247,0.08));
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      padding: 2rem 1.8rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
    }
    .result-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.2rem;
      line-height: 1.9;
      color: #f0e6ff;
      word-break: keep-all;
    }
    .result-sub {
      font-size: 0.85rem;
      color: #c084fc;
      margin-top: 0.8rem;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 0.7rem;
      justify-content: center;
    }
    .btn-again {
      padding: 0.65rem 1.6rem;
      background: transparent;
      color: #a855f7;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-again:hover {
      background: rgba(168,85,247,0.12);
      border-color: #a855f7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

  </div>

  <!-- 로딩 -->
  <div id="loading">

    <p class="subtitle" id="loading-text" style="margin-bottom:1.5rem">준비하는 중...</p>
    <div class="dots">

    </div>
  </div>

  <!-- 결과 -->
  <div id="result">

    <div class="result-card">

    </div>
    <div class="btn-row">

    { name: "막창볶음 🌶️", desc: "고소하고 쫄깃한 막창볶음. 소주 없이도 맛있다." },
    { name: "족발 🐷", desc: "쫄깃한 족발 한 접시. 새우젓과 찰떡궁합." },
    { name: "보쌈 🥬", desc: "부드러운 수육과 신선한 쌈채소. 건강한 한 끼." },
    { name: "닭볶음탕 🍗", desc: "얼큰하고 든든한 닭볶음탕. 국물에 밥 비비면 끝." },
    { name: "백숙 🍗", desc: "보양식의 정석, 백숙 한 그릇. 오늘 힘내자." },
    { name: "오리진흙구이 🦆", desc: "구수하고 담백한 오리구이. 특별한 날의 보양식." },
    { name: "감자탕 🍲", desc: "뼈다귀 감자탕 한 냄비. 뼛속까지 든든하게." },
    { name: "아구찜 🌶️", desc: "얼큰한 아구찜에 콩나물. 매운 맛 마니아의 선택." },
    { name: "해물탕 🦞", desc: "싱싱한 해산물이 가득한 해물탕. 바다가 느껴진다." },
    { name: "조개구이 🦪", desc: "석쇠 위에서 익어가는 조개들. 버터 올리면 완벽." },
    { name: "양꼬치 🍢", desc: "고소한 양꼬치에 쯔란 솔솔. 맥주 없이도 맛있다." },
    { name: "훠궈 🌶️", desc: "끓는 육수에 재료를 퐁당. 오늘은 훠궈 파티." },
    { name: "호텔파인다이닝 🍽️", desc: "오늘만큼은 최고의 대접을 받을 자격이 있다." },
    { name: "한우오마카세 🥩", desc: "셰프가 고른 최고의 한우 코스. 오늘 이 선택 후회 없다." },
    { name: "스시오마카세 🍣", desc: "장인의 손에서 탄생한 한 점 한 점. 황홀한 경험." },
    { name: "랍스터버터구이 🦞", desc: "풍성한 랍스터에 버터 향. 오늘 나 자신에게 선물." },
    { name: "킹크랩찜 🦀", desc: "킹크랩 찜 한 상. 오늘만큼은 왕처럼 먹자." },
    { name: "대게수산 🦀", desc: "싱싱한 대게 한 마리. 뜯는 재미가 먹는 재미." },
    { name: "프렌치코스요리 🍷", desc: "우아하게 코스로. 오늘 점심은 파리 느낌으로." },
    { name: "트러플파스타 🍝", desc: "트러플 향이 은은하게. 고급진 한 끼." },
    { name: "캐비어오믈렛 🥚", desc: "캐비어를 올린 오믈렛. 오늘은 특별하게 시작." },
    { name: "베이징덕 🦆", desc: "바삭한 오리 껍질의 황제. 한 번은 먹어봐야 할 맛." },
    { name: "불도장 🍲", desc: "전설의 불도장. 먹어봤다면 설명이 필요 없다." },
    { name: "일식사시미코스 🐟", desc: "제철 생선회 코스. 오늘은 바다와 함께." },
    { name: "철판요리코스 🍳", desc: "셰프의 퍼포먼스와 함께하는 철판 코스." },
    { name: "고베규스테이크 🥩", desc: "마블링의 예술, 고베규 스테이크. 말이 필요 없다." },
    { name: "티본스테이크 🥩", desc: "티본 한 장. 오늘 가장 호쾌한 선택이 될 것이다." },
    { name: "우니동 🦔", desc: "성게 알이 가득한 우니동. 바다의 정수." },
    { name: "독도새우회 🦐", desc: "달콤하고 탱글한 독도새우. 희귀하고 귀한 맛." },
    { name: "포케 🥗", desc: "하와이안 포케볼. 건강하고 트렌디하게." },
    { name: "그릭요거트볼 🥗", desc: "상큼하고 건강하게. 오늘은 가볍게 리셋." },
    { name: "치킨치즈랩 🌯", desc: "치킨과 치즈의 만남. 손에 들고 간편하게." },
    { name: "타코 🌮", desc: "바삭한 타코 쉘에 알찬 속재료. 멕시코 느낌으로." },
    { name: "퀘사디아 🧀", desc: "치즈 듬뿍 퀘사디아. 늘어나는 치즈가 행복이다." },
    { name: "부리또 🌯", desc: "한 손에 꽉 차는 부리또. 든든하고 간편하게." },
    { name: "수제버거 🍔", desc: "수제 패티의 육즙이 폭발. 오늘 점심 미션 완료." },
    { name: "마르게리따피자 🍕", desc: "클래식의 힘. 마르게리따 한 판이면 충분하다." },
    { name: "뇨끼 🍝", desc: "쫀득한 뇨끼에 크림소스. 이탈리아 느낌 물씬." },
    { name: "라자냐 🍝", desc: "층층이 쌓인 라자냐. 한 조각이 한 끼." },
    { name: "인도난과커리 🍛", desc: "향신료 가득한 인도 커리. 오늘은 이국적으로." },
    { name: "나시고랭 🍳", desc: "동남아 볶음밥의 정석. 여행 감성으로 한 끼." },
    { name: "미고랭 🍜", desc: "향긋한 미고랭 볶음면. 인도네시아 현지 느낌." },
    { name: "분짜 🍜", desc: "베트남 분짜 한 그릇. 깔끔하고 향긋하게." },
    { name: "반미샌드위치 🥖", desc: "바삭한 바게트에 베트남 속재료. 가볍게 즐기자." },
    { name: "편의점도시락 🍱", desc: "바쁜 날엔 편의점. 그것도 나쁘지 않다." },
    { name: "컵라면과삼각김밥 🍜", desc: "인생 최고의 조합. 가성비는 최고다." },
    { name: "길거리토스트 🍞", desc: "버터 향 가득한 길거리 토스트. 추억의 맛." },
    { name: "시장떡볶이와튀김 🌶️", desc: "시장 특유의 그 맛. 포장마차 앞에 줄 서자." },
    { name: "아이스아메리카노와조각케이크 ☕", desc: "점심은 생략. 오늘은 디저트가 메인이다." },
  ];

  let currentMode = 'message';
  let lastIdx = -1;

  function show(mode) {
    currentMode = mode;
    document.getElementById('landing').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    if (mode === 'message') {
      document.getElementById('loading-icon').innerText = '💌';
      document.getElementById('loading-text').innerText = '메시지를 준비하는 중...';
    } else {
      document.getElementById('loading-icon').innerText = '🍽️';
      document.getElementById('loading-text').innerText = '오늘의 메뉴를 고르는 중...';
    }

    setTimeout(() => render(mode), 1800);
  }

  function render(mode) {
    const list = mode === 'message' ? messages : menus;
    let idx;
    do { idx = Math.floor(Math.random() * list.length); } while (idx === lastIdx && list.length > 1);
    lastIdx = idx;

    if (mode === 'message') {
      document.getElementById('result-label').innerText = '✦ 오늘의 메시지 ✦';
      document.getElementById('result-text').innerText = list[idx];
      document.getElementById('result-sub').innerText = '';
      document.getElementById('btn-again').innerText = '🔄 다른 메시지 보기';
    } else {
      document.getElementById('result-label').innerText = '✦ 오늘의 메뉴 추천 ✦';
      document.getElementById('result-text').innerText = list[idx].name;
      document.getElementById('result-sub').innerText = list[idx].desc;
      document.getElementById('btn-again').innerText = '🔄 다른 메뉴 보기';
    }

    document.getElementById('loading').style.display = 'none';
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    resultEl.style.animation = 'none';
    void resultEl.offsetWidth;
    resultEl.style.animation = 'fadeIn 0.8s ease';
  }

  function reroll() { render(currentMode); }

  function goHome() {
    document.getElementById('result').style.display = 'none';
    lastIdx = -1;
    const landing = document.getElementById('landing');
    landing.style.display = 'block';
    landing.style.animation = 'none';
    void landing.offsetWidth;
    landing.style.animation = 'fadeIn 0.6s ease';
  }
</script>
</body>
</html>
