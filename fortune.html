<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 메시지</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    /* 별 배경 */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    /* ── 랜딩 화면 ── */
    #landing { animation: fadeIn 1.2s ease; }

    .moon {
      font-size: 5rem;
      display: block;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .title {
      font-family: 'Noto Serif KR', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f0e6ff;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #9b8abf;
      margin-bottom: 2.5rem;
      letter-spacing: 0.08em;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 36px rgba(168, 85, 247, 0.7);
    }
    .btn:active { transform: translateY(0); }

    /* ── 결과 화면 ── */
    #result { display: none; animation: fadeIn 0.8s ease; }

    .crystal {
      font-size: 4rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: spin-glow 4s ease-in-out infinite;
    }
    @keyframes spin-glow {
      0%, 100% { filter: drop-shadow(0 0 8px #a855f7); transform: rotate(-5deg); }
      50% { filter: drop-shadow(0 0 20px #7c3aed); transform: rotate(5deg); }
    }

    .result-label {
      font-size: 0.85rem;
      color: #9b8abf;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }

    .fortune-card {
      background: linear-gradient(160deg, rgba(124,58,237,0.15), rgba(168,85,247,0.08));
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      padding: 2rem 1.8rem;
      margin-bottom: 1.8rem;
      backdrop-filter: blur(4px);
    }

    .fortune-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.2rem;
      line-height: 1.9;
      color: #f0e6ff;
      word-break: keep-all;
    }

    .fortune-star {
      display: block;
      margin-top: 1.2rem;
      font-size: 1rem;
      color: #c084fc;
      letter-spacing: 0.1em;
    }

    .btn-again {
      display: inline-block;
      padding: 0.7rem 2rem;
      background: transparent;
      color: #a855f7;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .btn-again:hover {
      background: rgba(168,85,247,0.12);
      border-color: #a855f7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 로딩 점 */
    #loading { display: none; }
    .dots span {
      display: inline-block;
      width: 10px; height: 10px;
      background: #a855f7;
      border-radius: 50%;
      margin: 0 4px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-12px); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <!-- 랜딩 -->
  <div id="landing">
    <span class="moon">✉️</span>
    <h1 class="title">오늘의 메시지</h1>
    <p class="subtitle">오늘 당신에게 건네는 한 문장</p>
    <button class="btn" onclick="showFortune()">💌 메시지 열기</button>
  </div>

  <!-- 로딩 -->
  <div id="loading">
    <span class="crystal">💌</span>
    <p class="subtitle" style="margin-bottom:1.5rem">메시지를 준비하는 중...</p>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result">
    <p class="result-label">✦ 오늘의 메시지 ✦</p>
    <div class="fortune-card">
      <p class="fortune-text" id="fortune-text"></p>
    </div>
    <button class="btn-again" onclick="showFortune()">🔄 다른 메시지 보기</button>
  </div>

</div>

<script>
  // ── 별 생성 ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── 메시지 문구 ──
  const fortunes = [
    "오늘의 노력이 내일의 나를 만든다",
    "늦어도 괜찮다, 멈추지만 않으면",
    "작은 시작이 큰 변화를 만든다",
    "포기하지 않는 사람이 결국 해낸다",
    "넘어져도 다시 걷는 게 중요하다",
    "완벽보다 꾸준함이 강하다",
    "오늘도 충분히 잘하고 있다",
    "내 속도로 가도 괜찮다",
    "힘든 날도 결국 지나간다",
    "한 걸음씩이면 충분하다",
    "괜찮아, 오늘도 버텼잖아",
    "너무 애쓰지 않아도 괜찮다",
    "쉬어가는 것도 앞으로 가는 과정이다",
    "당신은 생각보다 잘하고 있다",
    "오늘의 마음도 소중하다",
    "흐린 날도 지나면 맑아진다",
    "잠시 느려도 괜찮다",
    "조급함보다 방향이 중요하다",
    "결국 웃게 될 날이 온다",
    "지금의 나도 충분하다",
    "인생은 속도가 아니라 방향이다",
    "실패는 끝이 아니라 과정이다",
    "선택이 쌓여 인생이 된다",
    "비교보다 성장이 중요하다",
    "오늘을 사는 사람이 내일을 만든다",
    "기회는 준비된 마음에 온다",
    "흔들려도 앞으로 가면 된다",
    "결국 답은 내 안에 있다",
    "가장 늦은 때가 가장 빠른 시작일 수 있다",
    "경험은 결국 나를 성장시킨다",
    "행복은 멀리 있지 않다",
    "평범한 오늘이 가장 특별한 날",
    "작은 순간들이 삶을 만든다",
    "마음에도 휴식이 필요하다",
    "좋은 날은 스스로 만드는 것",
    "가장 빛나는 순간은 아직 오지 않았다",
    "천천히 가는 용기도 필요하다",
    "오늘의 작은 행복 놓치지 않기",
    "마음이 편한 곳이 좋은 곳이다",
    "지금 이 순간도 충분하다",
  ];

  let lastIndex = -1;

  function showFortune() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    setTimeout(() => {
      // 직전과 다른 문구 선택
      let idx;
      do { idx = Math.floor(Math.random() * fortunes.length); } while (idx === lastIndex && fortunes.length > 1);
      lastIndex = idx;

      document.getElementById('fortune-text').innerText = fortunes[idx];

      document.getElementById('loading').style.display = 'none';
      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.style.animation = 'none';
      void resultEl.offsetWidth;
      resultEl.style.animation = 'fadeIn 0.8s ease';
    }, 1800);
  }
</script>
</body>
</html>
